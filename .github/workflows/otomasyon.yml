name: Ilk Otomasyon Robotum

on:
  push:
    branches:
      - main

jobs:
  test-et:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari GitHub'dan Cek
        uses: actions/checkout@v3

      - name: Python 3.9 Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kodu Calistir ve Test Et
        run: python merhaba.py
